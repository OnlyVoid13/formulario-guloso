<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <h2>Cadastro de Perfil</h2>
        <form action="#" method="post">
            
            <div class="input-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="idade">Idade</label>
                    <input type="number" id="idade" name="idade" min="0" max="120" required>
                </div>

                <div class="input-group">
                    <label for="sexo">Sexo</label>
                    <select id="sexo" name="sexo" required>
                        <option value="" disabled selected>Selecione</option>
                        <option value="masculino">Masculino</option>
                        <option value="feminino">Feminino</option>
                        <option value="outro">Outro/Prefiro não dizer</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="exemplo@email.com" required>
            </div>

            <div class="input-group">
                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" required>
            </div>

            <div class="input-group">
                <label for="endereco">Endereço Completo</label>
                <input type="text" id="endereco" name="endereco" placeholder="Rua, número, bairro e cidade" required>
            </div>

            <button type="submit" class="btn-enviar">Finalizar Cadastro</button>
        </form>
    </div>
</body>
</html>
